<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Orçamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #1a1a1a; --accent: #D4AF37; --bg: #ffffff; --input-bg: #f8f9fa; --border: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; }
        body { background-color: #f0f2f5; color: var(--primary); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .app-container { background-color: var(--bg); width: 100%; max-width: 480px; border-radius: 28px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.1); border: 1px solid var(--border); }
        .header { padding: 40px 20px; text-align: center; background: #fff; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .step { display: none; padding: 35px; animation: fadeIn 0.4s ease-out; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        label { display: block; margin-bottom: 12px; font-weight: 700; font-size: 12px; color: #888; text-transform: uppercase; }
        input[type="text"], .input-full { width: 100%; padding: 18px; background: var(--input-bg); border: 2px solid var(--border); border-radius: 14px; margin-bottom: 25px; font-size: 16px; }
        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .btn-option { padding: 18px 10px; border: 2px solid var(--border); background: #fff; border-radius: 14px; cursor: pointer; font-size: 13px; text-align: center; font-weight: 600; transition: 0.3s; }
        .btn-option.selected { border-color: var(--accent); background: #fffdf5; color: var(--accent); }
        .slider-label { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 700; }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin-bottom: 35px; }
        .checkbox-item { display: flex; align-items: center; background: var(--input-bg); padding: 18px; border-radius: 14px; margin-bottom: 12px; cursor: pointer; border: 2px solid transparent; }
        .checkbox-item.selected { border-color: var(--accent); background: #fffdf5; }
        .checkbox-item input { margin-right: 15px; transform: scale(1.3); accent-color: var(--accent); }
        .btn-next { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 16px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .summary-card { background: #fdfdfd; padding: 25px; border-radius: 20px; border-left: 6px solid var(--accent); line-height: 1.6; }
        .total-display { text-align: center; padding: 30px 0; }
        .total-display strong { font-size: 38px; color: var(--primary); display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header"><h1>Simulador de Orçamento</h1></div>

    <div id="step1" class="step active">
        <label>Nome do Cliente</label>
        <input type="text" id="nome" placeholder="Seu nome">
        <label>Cidade do Evento</label>
        <input list="cidades" id="cidade" class="input-full" placeholder="Selecione a cidade">
        <datalist id="cidades"></datalist>
        <button class="btn-next" onclick="nextStep(2)">Próximo</button>
    </div>

    <div id="step2" class="step">
        <label>Atração do Evento</label>
        <div class="grid-options" style="grid-template-columns: 1fr 1fr 1fr;">
            <div class="btn-option" onclick="selectBtn(this, 'atracao', 'DJ')">Somente DJ</div>
            <div class="btn-option" onclick="selectBtn(this, 'atracao', 'Banda')">Banda</div>
            <div class="btn-option" onclick="selectBtn(this, 'atracao', 'Ambos')">DJ + Banda</div>
        </div>

        <div class="slider-label"><span>Duração do Evento</span> <span id="label-horas" style="color:var(--accent)">4h</span></div>
        <input type="range" id="horas" min="1" max="10" step="1" value="4" oninput="updateRange('label-horas', this.value + 'h')">

        <div class="slider-label"><span>Convidados</span> <span id="label-pessoas" style="color:var(--accent)">50</span></div>
        <input type="range" id="pessoas" min="50" max="1000" step="10" value="50" oninput="updateRange('label-pessoas', this.value)">
        
        <button class="btn-next" onclick="nextStep(3)">Continuar</button>
    </div>

    <div id="step3" class="step">
        <label>Ambiente</label>
        <div class="grid-options">
            <div class="btn-option" onclick="selectBtn(this, 'ambiente', 'Interno')">Interno</div>
            <div class="btn-option" onclick="selectBtn(this, 'ambiente', 'Externo')">Externo</div>
        </div>

        <label>Opcionais</label>
        <label class="checkbox-item" onclick="this.classList.toggle('selected')"><input type="checkbox" id="add-led"> Painel de LED 4x2m</label>
        <label class="checkbox-item" onclick="this.classList.toggle('selected')"><input type="checkbox" id="add-pista"> Pista Paris</label>
        <label class="checkbox-item" onclick="this.classList.toggle('selected')"><input type="checkbox" id="add-luz"> Iluminação Cênica</label>
        
        <button class="btn-next" onclick="gerarOrcamento()">Calcular Orçamento</button>
    </div>

    <div id="stepFinal" class="step">
        <div class="summary-card" id="resumo"></div>
        <div class="total-display">
            <span style="font-size:12px; color:#888;">VALOR TOTAL ESTIMADO</span>
            <strong id="total-final">R$ 0,00</strong>
        </div>
        <button class="btn-next" style="background:#25d366;" onclick="enviarZap()">Enviar para WhatsApp</button>
        <button class="btn-next" style="background:none; color:#bbb; font-size:11px; margin-top:10px;" onclick="location.reload()">Nova Simulação</button>
    </div>
</div>

<script>
    let choices = { atracao: '', ambiente: '' };
    const dbCidades = { "Varginha": 0, "Elói Mendes": 15, "Três Corações": 30, "Alfenas": 65, "Pouso Alegre": 110, "Lavras": 75, "Poços de Caldas": 160, "Extrema": 230, "Machado": 75, "Três Pontas": 32, "Boa Esperança": 75, "São Lourenço": 100, "Caxambu": 85, "Itajubá": 145, "Passos": 220, "Guaxupé": 180, "Cambuquira": 45, "Campanha": 40, "Paraguaçu": 55 }; // ... Adicione as outras conforme necessário

    // Preenche o datalist
    const datalist = document.getElementById('cidades');
    Object.keys(dbCidades).sort().forEach(c => { let opt = document.createElement('option'); opt.value = c; datalist.appendChild(opt); });

    function nextStep(n) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById('step' + n).classList.add('active'); }
    function selectBtn(el, cat, val) { el.parentElement.querySelectorAll('.btn-option').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); choices[cat] = val; }
    function updateRange(id, val) { document.getElementById(id).innerText = val; }

    function gerarOrcamento() {
        const pessoas = parseInt(document.getElementById('pessoas').value);
        const horas = parseInt(document.getElementById('horas').value);
        const cidade = document.getElementById('cidade').value;
        const km = dbCidades[cidade] || 80;

        // 1. Definição do PA (Som Base)
        let totalEvento = 0;
        let setupPA = "";
        let fator = choices.ambiente === 'Externo' ? pessoas * 1.4 : pessoas;

        if (fator <= 50) { totalEvento = 1000; setupPA = "PA 1x1"; }
        else if (fator <= 120) { totalEvento = 2250; setupPA = "PA 2x2"; }
        else if (fator <= 250) { totalEvento = 4000; setupPA = "PA 3x3"; }
        else if (fator <= 500) { totalEvento = 6250; setupPA = "PA 4x4"; }
        else if (fator <= 750) { totalEvento = 8750; setupPA = "PA 5x5"; }
        else { totalEvento = 12500; setupPA = "PA 6x6"; }

        // 2. Acréscimo de Backline (Banda exige mesa maior, microfones, cabos)
        if (choices.atracao === 'Banda' || choices.atracao === 'Ambos') {
            totalEvento += 600; // Custo médio de backline/mesa extra
        }

        // 3. Opcionais
        if (document.getElementById('add-led').checked) totalEvento += 1800;
        if (document.getElementById('add-pista').checked) totalEvento += 1200;
        if (document.getElementById('add-luz').checked) totalEvento += 800;

        // 4. Taxa de Horas Extras (15% por hora excedente a 6h)
        let taxaExtraHoras = 0;
        if (horas > 6) {
            let horasAdicionais = horas - 6;
            taxaExtraHoras = totalEvento * (0.15 * horasAdicionais);
            totalEvento += taxaExtraHoras;
        }

        // 5. Logística
        const custoDesloc = ((km * 2) / 9) * 6.20 + (Math.floor(km / 50) * 2 * 13.10);
        totalEvento += custoDesloc;

        // Exibição Final
        document.getElementById('total-final').innerText = totalEvento.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('resumo').innerHTML = `<strong>${document.getElementById('nome').value}</strong>,<br>Sua simulação para <strong>${horas}h</strong> de evento em <strong>${cidade}</strong> está pronta. Consideramos estrutura completa para <strong>${choices.atracao}</strong>.`;

        // Msg WhatsApp
        choices.resumoZap = `*NOVO ORÇAMENTO - LEAD*\n\n*Cliente:* ${document.getElementById('nome').value}\n*Local:* ${cidade}\n*Atração:* ${choices.atracao}\n*Duração:* ${horas}h\n*Público:* ${pessoas} pessoas\n\n*ESTRUTURA:* \n- Som: ${setupPA}\n${document.getElementById('add-luz').checked ? '- Iluminação Cênica Completa (4 Movings 9r, 6 Strobos RGB, 6 Par Leds, 2 Cobs)\n' : ''}${taxaExtraHoras > 0 ? '*Adicional de ' + (horas-6) + 'h extras (15%/h)*' : ''}\n\n*TOTAL:* ${totalEvento.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}`;

        nextStep('Final');
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#D4AF37', '#1a1a1a'] });
    }

    function enviarZap() { window.open(`https://wa.me/5535991565909?text=${encodeURIComponent(choices.resumoZap)}`, '_blank'); }
</script>
</body>
</html>
